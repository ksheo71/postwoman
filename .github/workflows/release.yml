name: Release

# 태그(vX.Y.Z) 푸시 시 macOS(유니버설: Intel+Apple Silicon) + Windows 빌드를
# 만들어 GitHub Release에 zip으로 첨부한다. 수동 실행(workflow_dispatch)도 지원.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build (macos-universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (+ x86_64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build both arches
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Make universal binary + .app bundle
        run: |
          lipo -create -output postwoman-universal \
            target/x86_64-apple-darwin/release/postwoman \
            target/aarch64-apple-darwin/release/postwoman
          ./scripts/bundle-macos.sh "$PWD/postwoman-universal"
          cd dist && zip -r "../Postwoman-macos-universal.zip" Postwoman.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Postwoman-macos-universal
          path: Postwoman-macos-universal.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Postwoman-macos-universal.zip
          fail_on_unmatched_files: true

  build-windows:
    name: Build (windows-x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package (.exe)
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/postwoman.exe -DestinationPath "Postwoman-windows-x86_64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Postwoman-windows-x86_64
          path: Postwoman-windows-x86_64.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Postwoman-windows-x86_64.zip
          fail_on_unmatched_files: true
