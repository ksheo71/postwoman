name: Release

# 태그(vX.Y.Z) 푸시 시 macOS(Apple Silicon) + Windows 빌드를 만들어
# GitHub Release에 zip으로 첨부한다. 수동 실행(workflow_dispatch)도 지원.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build (macos-arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package (.app)
        run: |
          ./scripts/bundle-macos.sh
          cd dist && zip -r "../Postwoman-macos-arm64.zip" Postwoman.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Postwoman-macos-arm64
          path: Postwoman-macos-arm64.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Postwoman-macos-arm64.zip
          fail_on_unmatched_files: true

  build-windows:
    name: Build (windows-x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package (.exe)
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/postwoman.exe -DestinationPath "Postwoman-windows-x86_64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Postwoman-windows-x86_64
          path: Postwoman-windows-x86_64.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Postwoman-windows-x86_64.zip
          fail_on_unmatched_files: true
